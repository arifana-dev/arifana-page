name: arifana_portfolio
description: Personal portfolio landing page for Arifana — Flutter Mobile Developer.
publish_to: "none"
version: 1.0.3+4

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.2.7
  flutter_animate: ^4.5.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
